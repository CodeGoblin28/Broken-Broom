<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>

body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    font-family: Arial;

    background-image: url("asset/Background/shop.png");
    background-repeat: no-repeat;
    background-size: cover;
}

/* dark overlay */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 1;
}

/* BACK BUTTON */

.back-button{
    position:absolute;
    top:20px;
    left:20px;
    z-index:3;

    padding:10px 20px;
    font-size:18px;
    font-weight:bold;

    color:white;
    background:rgba(0,0,0,0.6);
    border:2px solid white;
    border-radius:8px;

    cursor:pointer;
}

/* COIN DISPLAY */

.coin-display{
    position:absolute;
    top:20px;
    right:20px;
    z-index:3;

    font-size:24px;
    font-weight:bold;

    background:rgba(0,0,0,0.6);
    padding:10px 20px;
    border-radius:10px;
    color:gold;
}

/* SHOP CONTAINER */

.shop-container{
    position:absolute;
    top:100px;
    left:50%;
    transform:translateX(-50%);
    z-index:3;

    width:900px;
}

/* CATEGORY BUTTONS */

.tabs{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
}

.tab{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    border-radius:8px;
    border:none;
}

.tab.active{
    background:gold;
}

/* ITEMS GRID */

.items{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:20px;
}

.item{
    background:rgba(0,0,0,0.7);
    color:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    transition:0.2s;
}

.item.locked{
    opacity:0.5;
}

.item.owned{
    border:2px solid gold;
}

.buy-btn{
    margin-top:10px;
    padding:8px 14px;
    cursor:pointer;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.buy-btn:disabled{
    background:gray;
    cursor:not-allowed;
}

.coin-display{
    position:absolute;
    top:20px;
    right:20px;
    z-index:3;

    font-size:24px;
    font-weight:bold;

    background:rgba(0,0,0,0.6);
    padding:10px 20px;
    border-radius:10px;
    color:white;

    display:flex;
    align-items:center;
    gap:10px;
}

.coin-icon{
    width:32px;
    height:32px;
}

.item-image{
    width:80px;
    height:80px;
    object-fit:contain;
}

.price-icon{
    width:18px;
    vertical-align:middle;
}

</style>
</head>

<body>

<button class="back-button">← Back</button>

<div class="coin-display">
    <img src="asset/icons/coins.png" class="coin-icon">
    <span id="coinCount">0</span>
</div>

<div class="shop-container">

    <div class="tabs">
    <button class="tab active" data-category="skins">Skins</button>
    <button class="tab" data-category="upgrades">Upgrades</button>
    </div>

    <div class="items" id="itemsContainer"></div>

</div>

<audio id="shopMusic" loop>
    <source src="asset/audio/music/shop.mp3" type="audio/mpeg">
</audio>

<script>
const shopMusic = document.getElementById("shopMusic");
shopMusic.volume = 0.4;

function startShopMusic() {
    shopMusic.play().catch(() => {});
}

window.addEventListener("load", startShopMusic, { once: true });
window.addEventListener("click", startShopMusic, { once: true });
window.addEventListener("keydown", startShopMusic, { once: true });
/* LOAD COINS */

let coins = Number(localStorage.getItem("coins")) || 0;
document.getElementById("coinCount").textContent = coins;


/* SHOP ITEMS */

const shopItems = {

skins: [

{
name:"Default Skin",
price:0,
id:"default",
image:"asset/shop/default_skin.png"
},

{
name:"Blue Skin",
price:20,
id:"blue",
image:"asset/shop/blue_skin.png"
},

{
name:"Red Skin",
price:20,
id:"red",
image:"asset/shop/red_skin.png"
},

{
name:"Pink Skin",
price:20,
id:"pink",
image:"asset/shop/pink_skin.png"
}

],

upgrades: [
{
    name:"Health UP",
    price:50,
    id:"healthUp",
    image:"asset/shop/healthUp.png"
},
{
    name:"Shield",
    price:50,
    id:"upgrade_shield",
    image:"asset/shop/shield.png"
}
]
};




/* LOAD ITEMS */

function loadItems(category){

const container = document.getElementById("itemsContainer");
container.innerHTML = "";

shopItems[category].forEach(item=>{

const div = document.createElement("div");
div.className = "item";

const owned =
item.id === "default" ||
localStorage.getItem(item.id) === "owned";

const equipped = localStorage.getItem("equippedSkin") === item.id;

if(!owned && coins < item.price){
    div.classList.add("locked");
}

if(owned){
    div.classList.add("owned");
}

let buttonText = "";
let disabled = false;

if(!owned){

    buttonText = "Buy";

    if(coins < item.price){
        disabled = true;
    }

}else{

    if(category === "skins"){
        buttonText = equipped ? "Equipped" : "Equip";
    }else{
        buttonText = "Owned";
        disabled = true;
    }

}

div.innerHTML = `
<img src="${item.image}" class="item-image">

<h3>${item.name}</h3>

<p>
<img src="asset/icons/coins.png" class="price-icon">
${item.price}
</p>

<button class="buy-btn" ${disabled ? "disabled" : ""}>
${buttonText}
</button>
`;

const button = div.querySelector("button");

button.onclick = ()=>{

    if(!owned){
        buyItem(item);
    }else if(category === "skins" && !equipped){
        equipSkin(item);
    }

};

container.appendChild(div);

});

}

loadItems("skins");


/* BUY ITEM */

function buyItem(item){

if(coins < item.price){
alert("Not enough coins!");
return;
}

coins -= item.price;

localStorage.setItem("coins", coins);
localStorage.setItem(item.id, "owned");

document.getElementById("coinCount").textContent = coins;

loadItems(getActiveCategory());

}

/* Skin Equip */

function equipSkin(item){

localStorage.setItem("equippedSkin", item.id);

loadItems("skins");

}

function getActiveCategory(){
return document.querySelector(".tab.active").dataset.category;
}

/* CATEGORY SWITCH */

document.querySelectorAll(".tab").forEach(tab=>{

tab.addEventListener("click",()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

loadItems(tab.dataset.category);

});

});


/* BACK BUTTON */

document.querySelector('.back-button').onclick = () =>{
window.location.href = "index.html";
};

</script>

</body>
</html>
