<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select World</title>

<style>
    body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
    }

    /* Dark overlay */
    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1;
    }

    .worlds {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 60px;
        z-index: 2; /* Above overlay */
    }

    .world {
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .world img {
        width: 200px;
    }

    .world:hover {
        transform: scale(1.1);
    }

    .back-button {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 3; /* Above overlay */

        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;

        color: white;
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid white;
        border-radius: 8px;

        cursor: pointer;
        transition: 0.2s ease;
    }

    .back-button:hover {
        background: white;
        color: black;
        transform: scale(1.05);
    }
    </style>
</head>

<body>

<button class="back-button">← Back</button>

<div class="worlds">
    <div class="world" data-world="forest">
        <img src="asset/worlds/Forest.png" alt="Forest">
    </div>

    <div class="world" data-world="cave">
        <img src="asset/worlds/Cave.png" alt="Cave">
    </div>

    <div class="world" data-world="volcano">
        <img src="asset/worlds/Volcano.png" alt="Volcano">
    </div>

    <div class="world" data-world="sky">
        <img src="asset/worlds/Sky.png" alt="Sky">
    </div>
</div>

<script>
    const body = document.body;

    // Background paths
    const backgrounds = {
        forest: "asset/Background/Forest/Forest.png",
        cave: "asset/Background/Cave/Cave.png",
        volcano: "asset/Background/Volcano/Volcano.png",
        sky: "asset/Background/Sky/Sky.png"
    };

    // Back button
    document.querySelector('.back-button').addEventListener('click', () => {
        window.location.href = "index.html";
    });

    // ✅ Default background = Forest
    body.style.backgroundImage = `url(${backgrounds.forest})`;
    body.style.backgroundRepeat = "no-repeat";
    body.style.backgroundSize = "cover";
    body.style.backgroundPosition = "center";

    const worlds = document.querySelectorAll('.world');

    worlds.forEach(world => {

        // 🔥 Change background on hover
        world.addEventListener('mouseenter', () => {
            const selectedWorld = world.dataset.world;
            body.style.backgroundImage = `url(${backgrounds[selectedWorld]})`;
        });

        // 🎮 Click → go to game
        world.addEventListener('click', () => {
            const selectedWorld = world.dataset.world;
            window.location.href = `game.html?world=${selectedWorld}`;
        });
    });
</script>

</body>
</html>
